kind: pipeline
type: docker
name: watchtower-pr

trigger:
  event:
    - pull_request
  actions:
    - synchronized

environment:
  GO_VERSION: 1.25

services:
  - name: redis
    image: redis:alpine

  - name: rabbitmq
    image: rabbitmq:4-management

  - name: minio
    image: minio/minio
    commands:
      - minio server /data
    environment:
      MINIO_ROOT_USER: "minio-root"
      MINIO_ROOT_PASSWORD: "minio-root"

steps:
  - name: cache-built-go
    image: drillster/drone-volume-cache
    settings:
      restore: true
      mount:
        - /usr/local/go
        - /drone/src
    volumes:
      - name: go-targets
        path: /cache

  - name: build
    image: golang:1.25
    depends_on:
      - cache-built-go
    commands:
      - go build watchtower/cmd/watchtower
    volumes:
      - name: go-targets
        path: /cache

  - name: lint
    image: golang:1.25
    depends_on:
      - build
    commands:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - golangci-lint run ./...
    volumes:
      - name: go-targets
        path: /cache

  - name: test
    image: golang:1.25
    depends_on:
      - build
    commands:
      - sleep 15
      - curl -v -u guest:guest -K /drone/src/tests/config/rmq/headers.conf --data-binary '@/drone/src/tests/config/rmq/definitions.json' http://rabbitmq:15672/api/definitions
      - sleep 10
      - go test watchtower/tests
    volumes:
      - name: go-targets
        path: /cache

volumes:
  - name: go-targets
    temp: {}


# On merged pull request to main branch or created release branch
---
kind: pipeline
type: docker
name: watchtower-merged

trigger:
  event:
    - push
  branch:
    - main
    - master
    - release/*

environment:
  GO_VERSION: 1.25
  REGISTRY_ADDRESS: ${REGISTRY_ADDRESS}

services:
  - name: redis
    image: redis:alpine

  - name: rabbitmq
    image: rabbitmq:4-management

  - name: minio
    image: minio/minio
    commands:
      - minio server /data
    environment:
      MINIO_ROOT_USER: "minio-root"
      MINIO_ROOT_PASSWORD: "minio-root"

steps:
  - name: cache-built-go
    image: drillster/drone-volume-cache
    settings:
      restore: true
      mount:
        - /usr/local/go
        - /drone/src
    volumes:
      - name: go-targets
        path: /cache

  - name: build
    image: golang:1.25
    depends_on:
      - cache-built-go
    commands:
      - go build watchtower/cmd/watchtower
    volumes:
      - name: go-targets
        path: /cache

  - name: lint
    image: golang:1.25
    depends_on:
      - build
    commands:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - golangci-lint run ./...
    volumes:
      - name: go-targets
        path: /cache

  - name: test
    image: golang:1.25
    depends_on:
      - build
    commands:
      - sleep 15
      - curl -v -u guest:guest -K /drone/src/tests/config/rmq/headers.conf --data-binary '@/drone/src/tests/config/rmq/definitions.json' http://rabbitmq:15672/api/definitions
      - sleep 10
      - go test watchtower/tests
    volumes:
      - name: go-targets
        path: /cache

  - name: build-and-push-docker
    image: plugins/docker
    when:
      event:
        - tag
      branch:
        - main
        - master
        - release/*
    settings:
      repo: ${REGISTRY_ADDRESS}/sova-core/watchtower
      insecure: true
      dockerfile: Dockerfile
      registry: ${REGISTRY_ADDRESS}
      tags:
        - ${DRONE_COMMIT_SHA:0:8}
        - ${DRONE_TAG}
        - latest
      username:
        from_secret: GITEA_USERNAME
      password:
        from_secret: GITEA_TOKEN

volumes:
  - name: go-targets
    temp: {}


