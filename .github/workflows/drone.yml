kind: pipeline
type: docker
name: watchtower-ci

environment:
  GO_VERSION: 1.25

services:
  - name: redis
    image: redis:alpine

  - name: rabbitmq
    image: rabbitmq:4-management

  - name: minio
    image: minio/minio
    commands:
      - minio server /data
    environment:
      MINIO_ROOT_USER: "minio-root"
      MINIO_ROOT_PASSWORD: "minio-root"

steps:
  - name: cache-built-go
    image: drillster/drone-volume-cache
    settings:
      restore: true
      mount:
        - /usr/local/go
        - /drone/src
    volumes:
      - name: go-targets
        path: /cache

  - name: build
    image: golang:1.25
    depends_on:
      - cache-built-go
    commands:
      - go build watchtower/cmd/watchtower
    volumes:
      - name: go-targets
        path: /cache
 
  - name: lint
    image: golang:1.25
    depends_on:
      - build
    commands:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - golangci-lint run ./...
    volumes:
      - name: go-targets
        path: /cache

  - name: test
    image: golang:1.25
    depends_on:
      - build 
    commands:
      - sleep 15
      - curl -v -u guest:guest -K /drone/src/tests/config/rmq/headers.conf --data-binary '@/drone/src/tests/config/rmq/definitions.json' http://rabbitmq:15672/api/definitions
      - sleep 10
      - go test watchtower/tests
    volumes:
      - name: go-targets
        path: /cache

  - name: notify-gitea
    image: plugins/gitea-release
    settings:
      base_url: ${GITEA_SERVER}
      api_key:
        from_secret: gitea_token
      files: 
        - config
        - docs
        - "*.md"
        - "bin/*"
    when:
      event: tag

volumes:
  - name: go-targets
    temp: {}
