definitions:
  form.BadRequestError:
    properties:
      message:
        example: Bad Request message
        type: string
      status:
        example: 400
        type: integer
    type: object
  form.BucketSchema:
    properties:
      created_at:
        type: string
      id:
        type: string
      path:
        type: string
    type: object
  form.CopyFileForm:
    properties:
      dst_path:
        example: test-document.docx
        type: string
      src_path:
        example: old-test-document.docx
        type: string
      with_remove:
        example: true
        type: boolean
    type: object
  form.CreateBucketForm:
    properties:
      bucket_name:
        example: test-bucket
        type: string
    type: object
  form.DownloadFileForm:
    properties:
      file_name:
        example: test-file.docx
        type: string
    type: object
  form.FolderForm:
    properties:
      prefix:
        example: test-folder
        type: string
    type: object
  form.GetFileAttributesForm:
    properties:
      file_path:
        example: test-file.docx
        type: string
    type: object
  form.GetFilesForm:
    properties:
      directory:
        example: test-folder/
        type: string
      limit:
        example: 10
        type: integer
      offset:
        example: 0
        type: integer
    type: object
  form.InternalServerError:
    properties:
      message:
        example: Internal server error message
        type: string
      status:
        example: 500
        type: integer
    type: object
  form.NotFoundError:
    properties:
      message:
        example: Not found
        type: string
      status:
        example: 404
        type: integer
    type: object
  form.RemoveFileForm:
    properties:
      file_name:
        example: test-file.docx
        type: string
    type: object
  form.ServerUnavailableError:
    properties:
      message:
        example: Server unavailable error message
        type: string
      status:
        example: 503
        type: integer
    type: object
  form.ShareFileForm:
    properties:
      expired_secs:
        example: 3600
        type: integer
      file_path:
        example: test-file.docx
        type: string
    type: object
  form.Success:
    properties:
      message:
        example: Done
        type: string
      status:
        example: 200
        type: integer
    type: object
  form.TaskSchema:
    properties:
      bucket_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      modified_at:
        type: string
      object_data_size:
        type: integer
      object_id:
        type: string
      status:
        type: integer
      status_text:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/cloud/{bucket}:
    delete:
      description: Remove bucket from cloud
      operationId: remove-bucket
      parameters:
      - description: Bucket name to remove
        in: path
        name: bucket
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Remove bucket from cloud
      tags:
      - buckets
  /api/v1/cloud/{bucket}/file:
    delete:
      description: Remove file from cloud
      operationId: remove-file-2
      parameters:
      - description: Bucket name to remove file
        in: path
        name: bucket
        required: true
        type: string
      - description: Parameters to remove file
        in: query
        name: file_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Remove file from cloud
      tags:
      - files
    patch:
      consumes:
      - application/json
      description: Copy file to another location into bucket
      operationId: copy-file
      parameters:
      - description: Bucket name of src file
        in: path
        name: bucket
        required: true
        type: string
      - description: Params to copy file
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.CopyFileForm'
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket or file not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Copy file to another location into bucket
      tags:
      - files
  /api/v1/cloud/{bucket}/file/attributes:
    post:
      consumes:
      - application/json
      description: Get file attributes
      operationId: get-file-attrs
      parameters:
      - description: Bucket name to get list files
        in: path
        name: bucket
        required: true
        type: string
      - description: Parameters to get list files
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.GetFileAttributesForm'
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket or Object not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Get file attributes
      tags:
      - files
  /api/v1/cloud/{bucket}/file/download:
    post:
      consumes:
      - application/json
      description: Download file from cloud
      operationId: download-file
      parameters:
      - description: Bucket name to download file
        in: path
        name: bucket
        required: true
        type: string
      - description: Parameters to download file
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.DownloadFileForm'
      produces:
      - application/json
      responses:
        "200":
          description: Returned file bytes
          schema:
            type: file
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Download file from cloud
      tags:
      - files
  /api/v1/cloud/{bucket}/file/remove:
    delete:
      description: Remove file from cloud
      operationId: remove-file
      parameters:
      - description: Bucket name to remove file
        in: path
        name: bucket
        required: true
        type: string
      - description: Parameters to remove file
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.RemoveFileForm'
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Remove file from cloud
      tags:
      - files
  /api/v1/cloud/{bucket}/file/share:
    post:
      consumes:
      - application/json
      description: Get share URL for file
      operationId: share-file
      parameters:
      - description: Bucket name to share file
        in: path
        name: bucket
        required: true
        type: string
      - description: Parameters to share file
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.ShareFileForm'
      produces:
      - application/json
      responses:
        "200":
          description: URL with shared file
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket of object not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Get share URL for file
      tags:
      - share
  /api/v1/cloud/{bucket}/file/upload:
    put:
      consumes:
      - multipart/form
      description: Upload files to cloud
      operationId: upload-files
      parameters:
      - description: Bucket name to upload files
        in: path
        name: bucket
        required: true
        type: string
      - description: Files multipart form
        in: formData
        name: files
        required: true
        type: file
      - description: File datetime expired like 2025-01-01T12:01:01Z
        in: query
        name: expired
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Upload files to cloud
      tags:
      - files
  /api/v1/cloud/{bucket}/files:
    post:
      consumes:
      - application/json
      description: Get files list into bucket
      operationId: get-list-files
      parameters:
      - description: Bucket name to get list files
        in: path
        name: bucket
        required: true
        type: string
      - description: Parameters to get list files
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.GetFilesForm'
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Get files list into bucket
      tags:
      - files
  /api/v1/cloud/{bucket}/folder:
    delete:
      consumes:
      - application/json
      description: Delete empty folder into cloud storage
      operationId: delete-folder
      parameters:
      - description: Bucket name to delete folder
        in: path
        name: bucket
        required: true
        type: string
      - description: Params to delete folder
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.FolderForm'
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Delete folder into cloud storage
      tags:
      - files
    post:
      consumes:
      - application/json
      description: Create empty folder into cloud storage
      operationId: create-folder
      parameters:
      - description: Bucket name to create folder
        in: path
        name: bucket
        required: true
        type: string
      - description: Params to create folder
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.FolderForm'
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Create empty folder into cloud storage
      tags:
      - files
  /api/v1/cloud/bucket:
    put:
      consumes:
      - application/json
      description: Create new bucket into cloud
      operationId: create-bucket
      parameters:
      - description: Bucket name to create
        in: body
        name: jsonQuery
        required: true
        schema:
          $ref: '#/definitions/form.CreateBucketForm'
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/form.Success'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Create new bucket into cloud
      tags:
      - buckets
  /api/v1/cloud/buckets:
    get:
      description: Get watched bucket list
      operationId: get-buckets
      produces:
      - application/json
      responses:
        "200":
          description: Loaded buckets info
          schema:
            items:
              $ref: '#/definitions/form.BucketSchema'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Get watched bucket list
      tags:
      - buckets
  /api/v1/tasks/{bucket}:
    get:
      consumes:
      - application/json
      description: Load tasks (processing/unrecognized/done) of uploaded files
      operationId: load-tasks
      parameters:
      - description: Bucket id of uploaded files
        in: path
        name: bucket
        required: true
        type: string
      - description: Status tasks to filter target result
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Loaded tasks
          schema:
            items:
              $ref: '#/definitions/form.TaskSchema'
            type: array
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Bucket not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Load processing tasks of uploaded files into bucket
      tags:
      - tasks
  /api/v1/tasks/{bucket}/{task_id}:
    get:
      consumes:
      - application/json
      description: Load processing/unrecognized/done task by id of uploaded file
      operationId: load-task-by-id
      parameters:
      - description: Bucket id of processing task
        in: path
        name: bucket
        required: true
        type: string
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Loaded tasks
          schema:
            $ref: '#/definitions/form.TaskSchema'
        "400":
          description: Bad Request error
          schema:
            $ref: '#/definitions/form.BadRequestError'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/form.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/form.InternalServerError'
        "503":
          description: Server does not available
          schema:
            $ref: '#/definitions/form.ServerUnavailableError'
      summary: Load processing task by id
      tags:
      - tasks
swagger: "2.0"
